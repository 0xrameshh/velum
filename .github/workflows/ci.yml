name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - run: go mod download
      - run: go build -o /dev/null ./cmd/velum ./cmd/velum-api ./cmd/velum-history ./cmd/velum-matcher ./cmd/velum-scheduler ./cmd/velum-migrate ./cmd/velum-worker
      - run: go test ./...
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: velum:ci
